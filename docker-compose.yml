version: "3.9"

# ---------------------------------------------------------------------------
# Named volumes – persisted across container restarts and re-deploys.
# ---------------------------------------------------------------------------
volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  app_uploads:
    driver: local
  app_logs:
    driver: local
  nginx_certs:
    driver: local

# ---------------------------------------------------------------------------
# Networks – all services share a single bridge network.
# Nginx is the only service with ports bound on the host.
# ---------------------------------------------------------------------------
networks:
  app-network:
    driver: bridge

# ---------------------------------------------------------------------------
# Re-usable logging configuration applied to every service via YAML anchors.
# ---------------------------------------------------------------------------
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "5"

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # --------------------------------------------------------------------------
  # app – the main Express web server
  # --------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: instaflow-saas:latest
    container_name: instaflow-app
    restart: unless-stopped

    # Load all runtime environment variables from .env at deploy time.
    # Docker Compose variable substitution reads the same file, so compose-
    # level references like ${MONGO_ROOT_PASSWORD} resolve correctly too.
    env_file:
      - .env

    environment:
      NODE_ENV: production
      PORT: 3000

    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

    # Do NOT expose the app port directly on the host.
    # All traffic enters through Nginx on 80/443.
    expose:
      - "3000"

    volumes:
      # User-uploaded media – shared with Nginx for direct static serving
      - app_uploads:/app/public/uploads
      # Application logs – readable by log shippers on the host
      - app_logs:/app/logs

    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

    networks:
      - app-network

    logging: *default-logging

  # --------------------------------------------------------------------------
  # worker – BullMQ job processors (Instagram actions, email, etc.)
  # --------------------------------------------------------------------------
  worker:
    image: instaflow-saas:latest
    container_name: instaflow-worker
    restart: unless-stopped
    command: ["node", "src/workers/index.js"]

    env_file:
      - .env

    environment:
      NODE_ENV: production
      # Signal to the worker entrypoint that this container runs the scheduler
      START_SCHEDULER: "true"

    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy

    volumes:
      - app_uploads:/app/public/uploads
      - app_logs:/app/logs

    networks:
      - app-network

    logging: *default-logging

  # --------------------------------------------------------------------------
  # mongo – MongoDB 7.0 with authentication and a single-node replica set.
  # A replica set is required for BullMQ change-stream features and for
  # proper multi-document transaction support.
  # --------------------------------------------------------------------------
  mongo:
    image: mongo:7.0
    container_name: instaflow-mongo
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-instaflow}

    # Start mongod with replica set enabled. The rs.initiate() call below
    # is idempotent – it does nothing if the replica set is already configured.
    command: >
      mongod
      --replSet rs0
      --bind_ip_all
      --auth
      --keyFile /etc/mongo-keyfile

    volumes:
      - mongo_data:/data/db
      # Keyfile is required for intra-replica-set auth even with a single node.
      # Generate once: openssl rand -base64 756 > mongo-keyfile && chmod 400 mongo-keyfile
      - ./mongo-keyfile:/etc/mongo-keyfile:ro
      # Initialisation scripts run on first start when the data directory is empty.
      - ./mongo-init.js:/docker-entrypoint-initdb.d/01-init.js:ro

    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok",
          "--username", "${MONGO_ROOT_USER:-admin}",
          "--password", "${MONGO_ROOT_PASSWORD}",
          "--authenticationDatabase", "admin"
        ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

    networks:
      - app-network

    logging: *default-logging

  # --------------------------------------------------------------------------
  # redis – Redis 7.2 with password auth and AOF persistence
  # --------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: instaflow-redis
    restart: unless-stopped

    # requirepass sets the AUTH password. appendonly enables AOF durability.
    # maxmemory-policy is set to allkeys-lru so Redis evicts least-recently-
    # used keys when memory is full rather than returning errors.
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 60

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 5

    networks:
      - app-network

    logging: *default-logging

  # --------------------------------------------------------------------------
  # nginx – reverse proxy, TLS termination, static file serving, rate limiting
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: instaflow-nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      # Main Nginx configuration
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # TLS certificates (managed by Certbot / acme.sh on the host)
      - nginx_certs:/etc/nginx/certs:ro
      # Certbot webroot for ACME HTTP-01 challenges
      - ./nginx/certbot-webroot:/var/www/certbot:ro
      # Serve uploaded user media directly without hitting Node
      - app_uploads:/app/public/uploads:ro

    depends_on:
      app:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 10s
      retries: 3

    networks:
      - app-network

    logging: *default-logging
