# =============================================================================
# Nginx production configuration for InstaFlow SaaS
# Tested with Nginx 1.24+ / 1.25+
# =============================================================================

# Run worker processes equal to the number of CPU cores available.
worker_processes auto;

# Raise the file-descriptor limit to support high concurrency.
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    # Maximum simultaneous connections per worker.
    worker_connections 4096;

    # Accept as many connections as possible per epoll wake-up.
    multi_accept on;

    # Use the most efficient I/O event model available on Linux.
    use epoll;
}

http {
    # -------------------------------------------------------------------------
    # Basic settings
    # -------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide Nginx version from error pages and the Server header.
    server_tokens off;

    # Efficient file transfer using kernel-level zero-copy.
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # Maximum size of a client request body (covers file uploads).
    client_max_body_size 10m;

    # Timeouts
    keepalive_timeout          65;
    keepalive_requests         1000;
    client_header_timeout      15s;
    client_body_timeout        30s;
    send_timeout               30s;
    reset_timedout_connection  on;

    # -------------------------------------------------------------------------
    # Custom log format: includes request timing and upstream cache status
    # so that APM tools and log parsers can measure end-to-end latency.
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time '
                    'cs=$upstream_cache_status';

    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------------------------
    # Gzip compression
    # Compressing responses reduces bandwidth by 60-80 % for text payloads.
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_comp_level   6;
    gzip_min_length   1000;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # -------------------------------------------------------------------------
    # Rate-limiting zones (stored in shared memory)
    # req_limit_per_ip  – general API traffic, 100 req/min per IP
    # webhook_limit     – Instagram webhook callbacks, 500 req/min per IP
    # -------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=req_limit_per_ip:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=webhook_limit:1m    rate=500r/m;

    # Return 429 Too Many Requests instead of the default 503.
    limit_req_status 429;

    # -------------------------------------------------------------------------
    # Upstream – the Node.js application cluster
    # keepalive 32 reuses TCP connections to avoid the overhead of a new
    # connection for every proxied request.
    # max_fails / fail_timeout provide basic circuit-breaker behaviour so
    # Nginx stops routing to an unresponsive backend temporarily.
    # -------------------------------------------------------------------------
    upstream app {
        server app:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # HTTP server – redirect every request to HTTPS permanently
    # -------------------------------------------------------------------------
    server {
        listen      80;
        listen      [::]:80;
        server_name _;

        # ACME HTTP-01 challenge path used by Certbot to obtain/renew certs.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # All other traffic → 301 redirect to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS server
    # -------------------------------------------------------------------------
    server {
        listen      443 ssl;
        listen      [::]:443 ssl;
        http2       on;
        server_name instaflow.io www.instaflow.io;

        # -----------------------------------------------------------------------
        # TLS configuration
        # Only TLS 1.2 and 1.3 are permitted; SSLv3 / TLS 1.0 / 1.1 are insecure.
        # -----------------------------------------------------------------------
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;

        # Prefer server-side cipher ordering. The suite below achieves an A+
        # rating on Qualys SSL Labs and supports Forward Secrecy.
        ssl_prefer_server_ciphers on;
        ssl_ciphers
            ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:
            ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:
            ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

        # Session resumption: reduces TLS handshake overhead for returning clients.
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Diffie-Hellman parameters for DHE cipher suites (2048-bit minimum).
        # Generate: openssl dhparam -out /etc/nginx/certs/dhparam.pem 2048
        ssl_dhparam /etc/nginx/certs/dhparam.pem;

        # OCSP stapling: allows Nginx to serve cached certificate status
        # responses so clients don't have to query the CA directly.
        ssl_stapling            on;
        ssl_stapling_verify     on;
        ssl_trusted_certificate /etc/nginx/certs/chain.pem;
        resolver                1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout        5s;

        # -----------------------------------------------------------------------
        # Security headers
        # -----------------------------------------------------------------------
        # HSTS: force HTTPS for 2 years, include subdomains, and submit to the
        # browser preload list.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Prevent the page from being loaded in an iframe (clickjacking protection).
        add_header X-Frame-Options "DENY" always;

        # Stop browsers from MIME-sniffing the response content-type.
        add_header X-Content-Type-Options "nosniff" always;

        # Legacy XSS filter hint for older browsers.
        add_header X-XSS-Protection "1; mode=block" always;

        # Restrict what data is sent in the Referer header to third-party sites.
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Content Security Policy – tighten as needed after auditing inline scripts.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

        # Permissions Policy (formerly Feature-Policy)
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

        # -----------------------------------------------------------------------
        # Proxy defaults reused across location blocks
        # -----------------------------------------------------------------------
        proxy_http_version      1.1;
        # Required for keepalive connections to the upstream.
        proxy_set_header        Upgrade            $http_upgrade;
        proxy_set_header        Connection         "upgrade";
        proxy_set_header        Host               $host;
        proxy_set_header        X-Real-IP          $remote_addr;
        proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto  $scheme;
        proxy_set_header        X-Request-ID       $request_id;

        # Proxy timeouts
        proxy_connect_timeout   10s;
        proxy_send_timeout      60s;
        proxy_read_timeout      60s;

        # Proxy buffering – buffer responses from upstream so slow clients don't
        # hold upstream connections open unnecessarily.
        proxy_buffering         on;
        proxy_buffer_size       8k;
        proxy_buffers           16 16k;
        proxy_busy_buffers_size 32k;

        # -----------------------------------------------------------------------
        # Location /  – general application traffic
        # -----------------------------------------------------------------------
        location / {
            limit_req zone=req_limit_per_ip burst=20 nodelay;
            proxy_pass http://app;
        }

        # -----------------------------------------------------------------------
        # Location /webhooks/ – Instagram / Razorpay webhook receivers
        # Higher rate limit; disable buffering so the upstream reads the body
        # immediately (webhooks must respond within Instagram's 5 s timeout).
        # -----------------------------------------------------------------------
        location /webhooks/ {
            limit_req zone=webhook_limit burst=50 nodelay;

            # Disable proxy buffering for webhook endpoints so that the Node
            # process receives the request body without delay.
            proxy_buffering         off;
            proxy_request_buffering off;

            proxy_pass http://app;
        }

        # -----------------------------------------------------------------------
        # Location /public/ – static assets served directly by Nginx
        # Avoids round-tripping to Node for CSS, JS, fonts, and images.
        # -----------------------------------------------------------------------
        location /public/ {
            alias /app/public/;

            # Pre-compressed files (.gz) are served transparently when the
            # client sends Accept-Encoding: gzip.
            gzip_static on;

            # Cache static assets for 7 days in the browser.
            expires     7d;
            add_header  Cache-Control "public, immutable";
            add_header  Vary "Accept-Encoding";

            # Deny directory listing.
            autoindex off;

            # Security: block access to dotfiles and sensitive directories.
            location ~ /\. {
                deny all;
            }
        }

        # -----------------------------------------------------------------------
        # Location /health – liveness probe endpoint
        # No rate limiting so monitoring tools are never blocked.
        # -----------------------------------------------------------------------
        location /health {
            access_log off;
            proxy_pass http://app;
        }

        location /healthz {
            access_log off;
            proxy_pass http://app;
        }

        # -----------------------------------------------------------------------
        # Custom error pages
        # -----------------------------------------------------------------------
        error_page 404              /errors/404.html;
        error_page 502 503 504      /errors/50x.html;

        location = /errors/404.html {
            root /app/public;
            internal;
        }

        location = /errors/50x.html {
            root /app/public;
            internal;
        }
    }
}
